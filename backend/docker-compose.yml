services:
  # ── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF persistence: every write is fsynced — survives crashes without data loss
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── API ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - .:/app

  # ── Worker ─────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --concurrency=4
      -Q default,webhooks,messages,agents
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - .:/app

  # ── Beat ───────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A app.core.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  redisdata:
  miniodata:
